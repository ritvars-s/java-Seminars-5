<html html xmlns:th="http://www.thymeleaf.org">
	
	<body>
		
		<h1 th:text="${myHeader}">Visi produkti mana veikala. Dati no Javas puses:</h1>
		<table style="width:100%; border-collapse:collapse; font-family:Arial, sans-serif;">
			<tr th:each="tempP : ${package}">
			
				<td th:text="${tempP.id}"></td>
				<td th:text="${tempP.price}"></td>
				<td th:text="${tempP.description}"></td>
				<td th:text="${tempP.quantity}"></td>
				<td th:text="${tempP.productType}"></td>
			
			</tr>
		</table>
		
		
	
		
	</body>

</html>
